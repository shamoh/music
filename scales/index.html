<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Hudební stupnice (nejen pro Alt Saxofon)" />
  <title>Scales</title>
  <link rel="manifest" href="/scales/manifest.json" />
  <link rel="apple-touch-icon" href="/scales/icons/icon.svg" />
  <link rel="stylesheet" href="/scales/css/style.css" />
  <script>
    // Apply saved visual profile before first paint to prevent flash
    try {
      const vars = JSON.parse(localStorage.getItem('scales-profile-vars') || 'null');
      if (vars) {
        const r = document.documentElement;
        for (const [k, v] of Object.entries(vars)) r.style.setProperty(k, v);
      }
    } catch (_) {}
  </script>
</head>
<body>
  <header>
    <h1>🎷 Scales</h1>
    <p class="subtitle">Stupnice (nejen pro Alt Saxofon)</p>
  </header>

  <main>
    <!-- Filter + scale selector -->
    <section class="filter-bar" aria-label="Výběr stupnice">

      <div class="filter-group">
        <span class="filter-label">Typ</span>
        <button class="filter-chip active" data-filter-type="major" aria-pressed="true">Dur</button>
        <button class="filter-chip active" data-filter-type="minor" aria-pressed="true">Moll</button>
      </div>

      <div class="filter-group">
        <span class="filter-label">Klíč</span>
        <button class="filter-chip active" data-filter-acc="sharp" aria-pressed="true"># Kříže</button>
        <button class="filter-chip active" data-filter-acc="flat"  aria-pressed="true">♭ Béčka</button>
      </div>

      <div class="filter-group scale-select-group">
        <label for="scale-select" class="filter-label">Stupnice</label>
        <select id="scale-select" aria-label="Výběr stupnice"></select>
      </div>

    </section>

    <!-- Major view (single scale) -->
    <section class="scale-section" id="major-view" hidden>
      <div class="title-row">
        <h2 id="major-title"></h2>
        <a id="major-range-link" class="range-link" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
      </div>
      <p id="major-chord" class="chord-label"></p>
      <div id="major-note-row" class="note-row" role="list" aria-label="Noty stupnice"></div>
      <div id="major-staff" class="staff-container" aria-live="polite"></div>
    </section>

    <!-- Minor view (3 variants) -->
    <section class="scale-section" id="minor-view" hidden>
      <h2 id="minor-title"></h2>
      <p id="minor-chord" class="chord-label"></p>

      <div class="minor-variant" id="minor-natural">
        <div class="title-row">
          <h3>Aiolská moll</h3>
          <a class="range-link" data-range-type="natural" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
        </div>
        <div class="note-row" role="list"></div>
        <div class="staff-container" aria-live="polite"></div>
      </div>

      <div class="minor-variant" id="minor-harmonic">
        <div class="title-row">
          <h3>Harmonická moll</h3>
          <a class="range-link" data-range-type="harmonic" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
        </div>
        <div class="note-row" role="list"></div>
        <div class="staff-container" aria-live="polite"></div>
      </div>

      <div class="minor-variant" id="minor-melodic">
        <div class="title-row">
          <h3>Melodická moll <span class="variant-hint">(vzestupná)</span></h3>
          <a class="range-link" data-range-type="melodic" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
        </div>
        <div class="note-row" role="list"></div>
        <div class="staff-container" aria-live="polite"></div>
      </div>
    </section>

  </main>

  <footer class="app-footer" id="app-footer"></footer>
  <div class="profile-corner">
    <select id="profile-select" aria-label="Vizuální profil"></select>
  </div>
  <script type="module" src="/scales/js/app.js"></script>
</body>
</html>
