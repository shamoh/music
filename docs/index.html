<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Kvintový kruh hudebních stupnic" />
  <title>Scales</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .circle-wrap {
      display: flex;
      justify-content: center;
    }
    .circle-wrap svg {
      width: 100%;
      height: auto;
      display: block;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .circle-tip {
      display: none;
      position: fixed;
      z-index: 9999;
      background: var(--bg-card, #252234);
      color: var(--text, #d4d0e8);
      border: 1px solid var(--border, #3a3650);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
      pointer-events: none;
      max-width: 220px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .circle-hint {
      font-size: 0.76rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 0.7rem;
      line-height: 1.6;
    }
    .circle-hint span { opacity: 0.5; }
    .scales-link {
      display: block;
      text-align: center;
      font-size: 0.86rem;
      color: var(--accent2);
      text-decoration: none;
      padding: 0.4rem 0 0.2rem;
    }
    .scales-link:hover { text-decoration: underline; }

    .keysig-section {
      width: 100%;
      padding: 0 0 0.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .keysig-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .keysig-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .keysig-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .keysig-table td {
      padding: 0.22rem 0.45rem;
      vertical-align: middle;
    }
    .keysig-td-dur  { text-align: right; font-weight: 600; white-space: nowrap; }
    .keysig-td-acc  { text-align: center; }
    .keysig-td-moll { text-align: left;  font-weight: 600; white-space: nowrap; }
    .ks-count { font-size: 0.88em; font-weight: 700; display: block; }
    .ks-notes { font-size: 0.70em; display: block; opacity: 0.85; line-height: 1.4; }
    .keysig-table a { text-decoration: none; }
    .keysig-table a:hover { text-decoration: underline; }
    @media (max-width: 520px) {
      .keysig-section { grid-template-columns: 1fr; }
    }
  </style>
  <script>
    try {
      const vars = JSON.parse(localStorage.getItem('scales-profile-vars') || 'null');
      if (vars) {
        const r = document.documentElement;
        for (const [k, v] of Object.entries(vars)) r.style.setProperty(k, v);
      }
    } catch (_) {}
  </script>
</head>
<body>
  <header>
    <h1>
      <a href="/" class="bc-logo">
        <svg class="logo" viewBox="0 0 85 50" aria-hidden="true">
          <!-- Staff Lines -->
          <path d="M 12 14 Q 45 9, 80 14" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 19 Q 45 14, 80 19" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 24 Q 45 19, 80 24" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 29 Q 45 24, 80 29" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 34 Q 45 29, 80 34" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />

          <!-- Artistic Treble Clef -->

          <circle cx="16.5" cy="43.5" r="2.2" fill="var(--logo-clef, #b09878)" />

          <!-- Notes 1 & 2 (beamed eighths) -->

          <line x1="38" y1="30" x2="38" y2="13" stroke="var(--logo-tonic, #a8b4e0)" stroke-width="1.5" stroke-linecap="round" />
          
          <ellipse cx="50" cy="24" rx="4.5" ry="3" transform="rotate(-20 50 24)" fill="var(--logo-chord, #e0a8b4)" />
          <line x1="54" y1="24" x2="54" y2="7" stroke="var(--logo-chord, #e0a8b4)" stroke-width="1.5" stroke-linecap="round" />
          
          <polygon points="38,13 54,7 54,10 38,16" fill="var(--logo-chord, #e0a8b4)" />

          <!-- Note 3 (quarter note, stem down) -->
          <ellipse cx="66" cy="18" rx="4.5" ry="3" transform="rotate(-20 66 18)" fill="var(--logo-accent, #88a888)" />
          <line x1="62" y1="18" x2="62" y2="33" stroke="var(--logo-accent, #88a888)" stroke-width="1.5" stroke-linecap="round" />

        </svg>

    <select id="profile-select" class="profile-select" aria-label="Vizuální profil"></select>
  </header>

  <main>
    <section class="scale-section">
      <h2 class="circle-title">Kvintový kruh hudebních stupnic</h2>
      <div class="circle-wrap" id="circle-wrap"></div>
      <p class="circle-hint">
        Kliknutím na stupnici přejdete na detail
        <span>&nbsp;·&nbsp;</span>
        Vnější ring: dur
        <span>&nbsp;·&nbsp;</span>
        Vnitřní: relativní moll
      </p>
      <a href="/scales/" class="scales-link">Procházet všechny stupnice →</a>
    </section>

    <section class="keysig-section">
      <div class="keysig-block">
        <p class="keysig-title">Křížky ♯</p>
        <div class="keysig-wrap" id="keysig-sharps"></div>
      </div>
      <div class="keysig-block">
        <p class="keysig-title">Béčka ♭</p>
        <div class="keysig-wrap" id="keysig-flats"></div>
      </div>
    </section>
  </main>

  <footer class="app-footer" id="app-footer"></footer>
  <script type="module">
    import { VISUAL_PROFILES, applyProfile, savedProfileId } from '/js/themes.js';
    import { APP_VERSION, BUILD_DATE } from '/js/defaults.js';
    import { initAnalytics } from '/js/analytics.js';
    import { SCALE_CATALOG } from '/js/music.js';

    /* ── 12 stupnic ve směru hod. ručiček od C ── */
    const SCALES = [
      { dur:'C',   moll:'a',   ks: 0 },
      { dur:'G',   moll:'e',   ks: 1 },
      { dur:'D',   moll:'h',   ks: 2 },
      { dur:'A',   moll:'fis', ks: 3 },
      { dur:'E',   moll:'cis', ks: 4 },
      { dur:'H',   moll:'gis', ks: 5,  alt: { dur:'Ces', moll:'as',  ks:-7 } },
      { dur:'Fis', moll:'dis', ks: 6,  alt: { dur:'Ges', moll:'es',  ks:-6 } },
      { dur:'Cis', moll:'ais', ks: 7,  alt: { dur:'Des', moll:'b',   ks:-5 } },
      { dur:'As',  moll:'f',   ks:-4 },
      { dur:'Es',  moll:'c',   ks:-3 },
      { dur:'B',   moll:'g',   ks:-2 },
      { dur:'F',   moll:'d',   ks:-1 },
    ];

    const N = 12, STEP = 30, GAP = 1.5;
    const toRad = d => d * Math.PI / 180;
    const cpx   = (cx, r, d) => cx + r * Math.cos(toRad(d));
    const cpy   = (cy, r, d) => cy + r * Math.sin(toRad(d));
    const ff    = n => n.toFixed(3);

    function arcPath(cx, cy, r1, r2, a1, a2) {
      const lg = a2 - a1 > 180 ? 1 : 0;
      return `M${ff(cpx(cx,r2,a1))},${ff(cpy(cy,r2,a1))}`
           + `A${r2},${r2},0,${lg},1,${ff(cpx(cx,r2,a2))},${ff(cpy(cy,r2,a2))}`
           + `L${ff(cpx(cx,r1,a2))},${ff(cpy(cy,r1,a2))}`
           + `A${r1},${r1},0,${lg},0,${ff(cpx(cx,r1,a1))},${ff(cpy(cy,r1,a1))}Z`;
    }

    function segFill(ks) {
      if (ks === 0) return 'hsl(158, 20%, 87%)';
      const t = Math.abs(ks) / 7;
      return ks > 0
        ? `hsl(${(40 - t * 16) | 0},${(34 + t * 53) | 0}%,${(88 - t * 46) | 0}%)`
        : `hsl(${(202 + t * 18) | 0},${(36 + t * 52) | 0}%,${(88 - t * 46) | 0}%)`;
    }
    function segInk(ks)  { return Math.abs(ks) >= 4 ? '#fff' : '#1a1a2e'; }
    function accStr(ks)  { return ks === 0 ? '○' : `${Math.abs(ks)}${ks > 0 ? '♯' : '♭'}`; }
    function segRot(angle) {
      let r = angle + 90;
      if (angle > 0 && angle < 180) r += 180;
      return r;
    }
    const SHARPS = ['Fis','Cis','Gis','Dis','Ais','Eis','His'];
    const FLATS  = ['B','Es','As','Des','Ges','Ces','Fes'];
    function accTooltip(ks) {
      if (ks === 0) return '○ bez předznamenání';
      const list = ks > 0 ? SHARPS.slice(0, ks) : FLATS.slice(0, -ks);
      return list.join(' · ');
    }
    function scaleTitle(name, type, ks) {
      const typeEn = type === 'dur' ? 'major' : 'minor';
      const entry  = SCALE_CATALOG.find(e => e.id === `${name}-${typeEn}`);
      const notes  = entry ? entry.notes.join(' ') : '';
      return notes ? `${name} ${type}\n${notes}` : `${name} ${type}`;
    }

    const NS = 'http://www.w3.org/2000/svg';
    function svgEl(tag, attrs, text) {
      const e = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
      if (text != null) e.textContent = text;
      return e;
    }

    /* Place rotated text lines in a segment */
    function drawLines(parent, x, y, rot, lines, ink) {
      const g = svgEl('g', { transform: `rotate(${rot.toFixed(1)},${ff(x)},${ff(y)})` });
      lines.forEach(({ text, fs, bold, href, dy = 0 }) => {
        if (!text) return;
        const t = svgEl('text', {
          x: ff(x), y: ff(y + dy),
          'font-size': fs,
          fill: ink,
          'font-weight': bold ? '700' : '400',
          'font-family': 'system-ui, -apple-system, sans-serif',
          'text-anchor': 'middle',
          'dominant-baseline': 'central',
        }, text);
        if (href) { const a = svgEl('a', { href }); a.appendChild(t); g.appendChild(a); }
        else g.appendChild(t);
      });
      parent.appendChild(g);
    }

    function renderCircle(container) {
      const SZ = 560, cx = SZ / 2, cy = SZ / 2;
      const svg = svgEl('svg', {
        viewBox: `0 0 ${SZ} ${SZ}`,
        role: 'img',
        'aria-label': 'Kvintový kruh hudebních stupnic',
      });

      const OR1 = 204, OR2 = 268;  // outer ring (dur)
      const MR1 = 144, MR2 = 204;  // middle ring (accidentals)
      const IR1 =  80, IR2 = 144;  // inner ring (moll)

      const NF = 13, TF = 8, SF = 11, AF = 10.5;  // font sizes

      const SPLIT_GAP = 0.07;

      SCALES.forEach((s, i) => {
        const mid = -90 + i * STEP;
        const a1  = mid - STEP / 2 + GAP / 2;
        const a2  = mid + STEP / 2 - GAP / 2;

        if (s.alt) {
          const sharpA2   = mid - SPLIT_GAP / 2;
          const flatA1    = mid + SPLIT_GAP / 2;
          const sharpMid  = (a1 + sharpA2) / 2;
          const flatMid   = (flatA1 + a2)  / 2;
          const sharpFill = segFill(s.ks);
          const flatFill  = segFill(s.alt.ks);
          const sharpInk  = segInk(s.ks);
          const flatInk   = segInk(s.alt.ks);
          const sharpRot  = segRot(sharpMid);
          const flatRot   = segRot(flatMid);

          // Outer ring — dur
          const sOL = svgEl('a', { href:`/scales/#${s.dur}-dur`,     style:'cursor:pointer' });
          sOL.appendChild(svgEl('path', { d: arcPath(cx,cy,OR1,OR2,a1,sharpA2), fill:sharpFill, 'fill-opacity':'0.82', stroke:'var(--bg)', 'stroke-width':'1.2' }));
          sOL.appendChild(svgEl('title', {}, scaleTitle(s.dur, 'dur', s.ks)));
          svg.appendChild(sOL);
          const fOL = svgEl('a', { href:`/scales/#${s.alt.dur}-dur`, style:'cursor:pointer' });
          fOL.appendChild(svgEl('path', { d: arcPath(cx,cy,OR1,OR2,flatA1,a2),  fill:flatFill,  'fill-opacity':'0.82', stroke:'var(--bg)', 'stroke-width':'1.2' }));
          fOL.appendChild(svgEl('title', {}, scaleTitle(s.alt.dur, 'dur', s.alt.ks)));
          svg.appendChild(fOL);

          // Middle ring — accidentals
          const mrS = svgEl('path', { d: arcPath(cx,cy,MR1,MR2,a1,sharpA2), fill:sharpFill, 'fill-opacity':'0.70', stroke:'var(--bg)', 'stroke-width':'0.8' });
          mrS.appendChild(svgEl('title', {}, accTooltip(s.ks)));
          svg.appendChild(mrS);
          const mrF = svgEl('path', { d: arcPath(cx,cy,MR1,MR2,flatA1,a2),  fill:flatFill,  'fill-opacity':'0.70', stroke:'var(--bg)', 'stroke-width':'0.8' });
          mrF.appendChild(svgEl('title', {}, accTooltip(s.alt.ks)));
          svg.appendChild(mrF);

          // Inner ring — moll
          const sIL = svgEl('a', { href:`/scales/#${s.moll}-moll`,     style:'cursor:pointer' });
          sIL.appendChild(svgEl('path', { d: arcPath(cx,cy,IR1,IR2,a1,sharpA2), fill:sharpFill, 'fill-opacity':'1.0', stroke:'var(--bg)', 'stroke-width':'0.8' }));
          sIL.appendChild(svgEl('title', {}, scaleTitle(s.moll, 'moll', s.ks)));
          svg.appendChild(sIL);
          const fIL = svgEl('a', { href:`/scales/#${s.alt.moll}-moll`, style:'cursor:pointer' });
          fIL.appendChild(svgEl('path', { d: arcPath(cx,cy,IR1,IR2,flatA1,a2),  fill:flatFill,  'fill-opacity':'1.0', stroke:'var(--bg)', 'stroke-width':'0.8' }));
          fIL.appendChild(svgEl('title', {}, scaleTitle(s.alt.moll, 'moll', s.alt.ks)));
          svg.appendChild(fIL);

          // Labels — sharp half
          drawLines(svg, cpx(cx,(OR1+OR2)/2,sharpMid), cpy(cy,(OR1+OR2)/2,sharpMid), sharpRot, [
            { text: s.dur,  fs: NF, bold: true, href:`/scales/#${s.dur}-dur`,  dy: -5 },
            { text: 'dur',  fs: TF, dy: 8 },
          ], sharpInk);
          drawLines(svg, cpx(cx,(MR1+MR2)/2,sharpMid), cpy(cy,(MR1+MR2)/2,sharpMid), sharpRot, [
            { text: `${s.ks}♯`, fs: AF },
          ], sharpInk);
          drawLines(svg, cpx(cx,(IR1+IR2)/2,sharpMid), cpy(cy,(IR1+IR2)/2,sharpMid), sharpRot, [
            { text: s.moll, fs: SF, bold: true, href:`/scales/#${s.moll}-moll`, dy: -4 },
            { text: 'moll', fs: TF, dy: 7 },
          ], sharpInk);

          // Labels — flat half
          drawLines(svg, cpx(cx,(OR1+OR2)/2,flatMid), cpy(cy,(OR1+OR2)/2,flatMid), flatRot, [
            { text: s.alt.dur,  fs: NF, bold: true, href:`/scales/#${s.alt.dur}-dur`,  dy: -5 },
            { text: 'dur',      fs: TF, dy: 8 },
          ], flatInk);
          drawLines(svg, cpx(cx,(MR1+MR2)/2,flatMid), cpy(cy,(MR1+MR2)/2,flatMid), flatRot, [
            { text: `${Math.abs(s.alt.ks)}♭`, fs: AF },
          ], flatInk);
          drawLines(svg, cpx(cx,(IR1+IR2)/2,flatMid), cpy(cy,(IR1+IR2)/2,flatMid), flatRot, [
            { text: s.alt.moll, fs: SF, bold: true, href:`/scales/#${s.alt.moll}-moll`, dy: -4 },
            { text: 'moll', fs: TF, dy: 7 },
          ], flatInk);

        } else {
          const fill = segFill(s.ks);
          const ink  = segInk(s.ks);
          const rot  = segRot(mid);

          // Outer ring — dur, clickable
          const outerLink = svgEl('a', { href:`/scales/#${s.dur}-dur`, style:'cursor:pointer' });
          outerLink.appendChild(svgEl('path', { d: arcPath(cx,cy,OR1,OR2,a1,a2), fill, 'fill-opacity':'0.82', stroke:'var(--bg)', 'stroke-width':'1.2' }));
          outerLink.appendChild(svgEl('title', {}, scaleTitle(s.dur, 'dur', s.ks)));
          svg.appendChild(outerLink);

          // Middle ring — accidentals
          const mr = svgEl('path', { d: arcPath(cx,cy,MR1,MR2,a1,a2), fill, 'fill-opacity':'0.70', stroke:'var(--bg)', 'stroke-width':'0.8' });
          mr.appendChild(svgEl('title', {}, accTooltip(s.ks)));
          svg.appendChild(mr);

          // Inner ring — moll, clickable
          const innerLink = svgEl('a', { href:`/scales/#${s.moll}-moll`, style:'cursor:pointer' });
          innerLink.appendChild(svgEl('path', { d: arcPath(cx,cy,IR1,IR2,a1,a2), fill, 'fill-opacity':'1.0', stroke:'var(--bg)', 'stroke-width':'0.8' }));
          innerLink.appendChild(svgEl('title', {}, scaleTitle(s.moll, 'moll', s.ks)));
          svg.appendChild(innerLink);

          // Labels
          drawLines(svg, cpx(cx,(OR1+OR2)/2,mid), cpy(cy,(OR1+OR2)/2,mid), rot, [
            { text: s.dur,  fs: NF, bold: true, href:`/scales/#${s.dur}-dur`,  dy: -5 },
            { text: 'dur',  fs: TF, dy: 8 },
          ], ink);
          drawLines(svg, cpx(cx,(MR1+MR2)/2,mid), cpy(cy,(MR1+MR2)/2,mid), rot, [
            { text: accStr(s.ks), fs: AF },
          ], ink);
          drawLines(svg, cpx(cx,(IR1+IR2)/2,mid), cpy(cy,(IR1+IR2)/2,mid), rot, [
            { text: s.moll, fs: NF, bold: true, href:`/scales/#${s.moll}-moll`, dy: -5 },
            { text: 'moll', fs: TF, dy: 8 },
          ], ink);
        }
      });

      // Center hole
      svg.appendChild(svgEl('circle', { cx, cy, r: IR1, fill: 'var(--bg)' }));

      // Mobile long-press tooltip
      let _pressTimer = null, _longPressActive = false;
      function _getTitleText(el) {
        let node = el;
        while (node && node !== svg) {
          const t = Array.from(node.children || []).find(c => c.tagName.toLowerCase() === 'title');
          if (t) return t.textContent;
          node = node.parentElement;
        }
        return null;
      }
      function _showTip(text, x, y) {
        let tip = document.getElementById('_ctip');
        if (!tip) {
          tip = Object.assign(document.createElement('div'), { id: '_ctip' });
          tip.className = 'circle-tip';
          document.body.appendChild(tip);
        }
        tip.textContent = text;
        const W = window.innerWidth;
        tip.style.left = `${Math.min(x + 14, W - 234)}px`;
        tip.style.top  = `${Math.max(y - 84, 8)}px`;
        tip.style.display = 'block';
        clearTimeout(tip._t);
        tip._t = setTimeout(() => { tip.style.display = 'none'; }, 5000);
      }
      svg.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        const cx = touch.clientX, cy = touch.clientY;
        _longPressActive = false;
        clearTimeout(_pressTimer);
        _pressTimer = setTimeout(() => {
          const text = _getTitleText(document.elementFromPoint(cx, cy));
          if (text) { _longPressActive = true; _showTip(text, cx, cy); }
        }, 600);
      }, { passive: true });
      svg.addEventListener('touchmove', () => clearTimeout(_pressTimer), { passive: true });
      svg.addEventListener('touchend',  () => clearTimeout(_pressTimer), { passive: true });
      svg.addEventListener('click', e => {
        if (_longPressActive) { e.preventDefault(); _longPressActive = false; }
      });

      container.appendChild(svg);
    }

    function renderKeySigTables() {
      const sharpRows = [];
      const flatRows  = [];

      for (let ks = 0; ks <= 7; ks++) {
        let found = null;
        for (const s of SCALES) {
          if (s.ks === ks) { found = { dur: s.dur, moll: s.moll }; break; }
          if (s.alt && s.alt.ks === ks) { found = { dur: s.alt.dur, moll: s.alt.moll }; break; }
        }
        if (found) sharpRows.push({
          ks,
          dur: found.dur,
          moll: found.moll,
          accStr: ks === 0 ? '○' : `${ks}♯`,
          noteList: ks === 0 ? '' : SHARPS.slice(0, ks).join(' · '),
        });
      }

      for (let ks = 0; ks >= -7; ks--) {
        let found = null;
        for (const s of SCALES) {
          if (s.ks === ks) { found = { dur: s.dur, moll: s.moll }; break; }
          if (s.alt && s.alt.ks === ks) { found = { dur: s.alt.dur, moll: s.alt.moll }; break; }
        }
        const n = Math.abs(ks);
        if (found) flatRows.push({
          ks,
          dur: found.dur,
          moll: found.moll,
          accStr: ks === 0 ? '○' : `${n}♭`,
          noteList: ks === 0 ? '' : FLATS.slice(0, n).join(' · '),
        });
      }

      function buildTable(rows, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const table = document.createElement('table');
        table.className = 'keysig-table';
        const tbody = document.createElement('tbody');
        rows.forEach(({ ks, dur, moll, accStr, noteList }) => {
          const tr = document.createElement('tr');
          const fill = segFill(ks);
          const ink  = segInk(ks);
          tr.style.background = fill;
          tr.style.color = ink;

          const tdDur = document.createElement('td');
          tdDur.className = 'keysig-td-dur';
          const aDur = document.createElement('a');
          aDur.href = `/scales/#${dur}-dur`;
          aDur.style.color = ink;
          aDur.textContent = `${dur} dur`;
          tdDur.appendChild(aDur);

          const tdAcc = document.createElement('td');
          tdAcc.className = 'keysig-td-acc';
          const spanCount = document.createElement('span');
          spanCount.className = 'ks-count';
          spanCount.textContent = accStr;
          tdAcc.appendChild(spanCount);
          if (noteList) {
            const spanNotes = document.createElement('span');
            spanNotes.className = 'ks-notes';
            spanNotes.textContent = noteList;
            tdAcc.appendChild(spanNotes);
          }

          const tdMoll = document.createElement('td');
          tdMoll.className = 'keysig-td-moll';
          const aMoll = document.createElement('a');
          aMoll.href = `/scales/#${moll}-moll`;
          aMoll.style.color = ink;
          aMoll.textContent = `${moll} moll`;
          tdMoll.appendChild(aMoll);

          tr.appendChild(tdDur);
          tr.appendChild(tdAcc);
          tr.appendChild(tdMoll);
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        container.appendChild(table);
      }

      buildTable(sharpRows, 'keysig-sharps');
      buildTable(flatRows,  'keysig-flats');
    }

    function initProfileSelect() {
      const sel = document.getElementById('profile-select');
      const current = savedProfileId();
      VISUAL_PROFILES.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        if (p.id === current) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', e => applyProfile(e.target.value));
    }

    document.addEventListener('DOMContentLoaded', () => {
      applyProfile(savedProfileId());
      initAnalytics();
      initProfileSelect();
      renderCircle(document.getElementById('circle-wrap'));
      renderKeySigTables();
      const footer = document.getElementById('app-footer');
      if (footer) {
        const a = Object.assign(document.createElement('a'), { href: '/history.html', textContent: `Scales v${APP_VERSION} · ${BUILD_DATE}` });
        footer.appendChild(a);
      }
    });
  </script>
</body>
</html>
