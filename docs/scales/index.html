<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Hudební stupnice (nejen pro Alt Saxofon)" />
  <title>Scales</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <script>
    // Apply saved visual profile before first paint to prevent flash
    try {
      const vars = JSON.parse(localStorage.getItem('scales-profile-vars') || 'null');
      if (vars) {
        const r = document.documentElement;
        for (const [k, v] of Object.entries(vars)) r.style.setProperty(k, v);
      }
    } catch (_) {}
  </script>
</head>
<body>
  <header>
    <h1>
      <a href="/" class="bc-logo">
        <svg class="logo" viewBox="0 0 85 50" aria-hidden="true">
          <!-- Staff Lines -->
          <path d="M 12 14 Q 45 9, 80 14" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 19 Q 45 14, 80 19" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 24 Q 45 19, 80 24" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 29 Q 45 24, 80 29" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />
          <path d="M 12 34 Q 45 29, 80 34" stroke="var(--logo-staff, #7878a0)" stroke-width="0.8" fill="none" opacity="0.4" />

          <!-- Artistic Treble Clef -->
          <path d="M 16.5 43.5 L 19.5 4 C 19.5 1, 22.5 0, 24 3 C 25.5 6, 24.5 11, 18.5 17 C 12.5 23, 10 29.5, 13 34.5 C 16 39.5, 23 39.5, 25.5 33.5 C 27.5 28, 22.5 22.5, 18.5 26.5 C 16.5 28.5, 17 31.5, 20 31" stroke="var(--logo-clef, #b09878)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="16.5" cy="43.5" r="2.2" fill="var(--logo-clef, #b09878)" />

          <!-- Notes 1 & 2 (beamed eighths) -->
          <ellipse cx="34" cy="30" rx="4.5" ry="3" transform="rotate(-20 34 30)" fill="var(--logo-tonic, #a8b4e0)" />
          <line x1="38" y1="30" x2="38" y2="13" stroke="var(--logo-tonic, #a8b4e0)" stroke-width="1.5" stroke-linecap="round" />
          
          <ellipse cx="50" cy="24" rx="4.5" ry="3" transform="rotate(-20 50 24)" fill="var(--logo-chord, #e0a8b4)" />
          <line x1="54" y1="24" x2="54" y2="7" stroke="var(--logo-chord, #e0a8b4)" stroke-width="1.5" stroke-linecap="round" />
          
          <polygon points="38,13 54,7 54,10 38,16" fill="var(--logo-chord, #e0a8b4)" />

          <!-- Note 3 (quarter note, stem down) -->
          <ellipse cx="66" cy="18" rx="4.5" ry="3" transform="rotate(-20 66 18)" fill="var(--logo-accent, #88a888)" />
          <line x1="62" y1="18" x2="62" y2="33" stroke="var(--logo-accent, #88a888)" stroke-width="1.5" stroke-linecap="round" />

        </svg>
      </a>
      <a href="/" class="bc-link">Hudební nauka</a>
      <span class="bc-sep" aria-hidden="true">›</span>
      <span class="bc-current">Stupnice</span>
    </h1>
    <select id="profile-select" class="profile-select" aria-label="Vizuální profil"></select>
  </header>

  <main>
    <!-- Filter + scale selector -->
    <section class="filter-bar" aria-label="Výběr stupnice">

      <div class="filter-group">
        <span class="filter-label">Typ</span>
        <button class="filter-chip active" data-filter-type="major" aria-pressed="true">Dur</button>
        <button class="filter-chip active" data-filter-type="minor" aria-pressed="true">Moll</button>
      </div>

      <div class="filter-group">
        <span class="filter-label">Klíč</span>
        <button class="filter-chip active" data-filter-acc="sharp" aria-pressed="true"># Kříže</button>
        <button class="filter-chip active" data-filter-acc="flat"  aria-pressed="true">♭ Béčka</button>
      </div>

      <div class="filter-group scale-select-group">
        <select id="scale-select" aria-label="Výběr stupnice"></select>
      </div>

    </section>

    <!-- Major view (single scale) -->
    <section class="scale-section" id="major-view" hidden>
      <div class="title-row">
        <h2 id="major-title"></h2>
        <a id="major-range-link" class="range-link" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
      </div>
      <p id="major-chord" class="chord-label"></p>
      <div id="major-note-row" class="note-row" role="list" aria-label="Noty stupnice"></div>
      <div id="major-staff" class="staff-container" aria-live="polite"></div>
    </section>

    <!-- Minor view (3 variants) -->
    <section class="scale-section" id="minor-view" hidden>
      <h2 id="minor-title"></h2>
      <p id="minor-chord" class="chord-label"></p>

      <div class="minor-variant" id="minor-natural">
        <div class="title-row">
          <h3>Aiolská moll</h3>
          <a class="range-link" data-range-type="natural" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
        </div>
        <div class="note-row" role="list"></div>
        <div class="staff-container" aria-live="polite"></div>
      </div>

      <div class="minor-variant" id="minor-harmonic">
        <div class="title-row">
          <h3>Harmonická moll</h3>
          <a class="range-link" data-range-type="harmonic" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
        </div>
        <div class="note-row" role="list"></div>
        <div class="staff-container" aria-live="polite"></div>
      </div>

      <div class="minor-variant" id="minor-melodic">
        <div class="title-row">
          <h3>Melodická moll <span class="variant-hint">(vzestupná)</span></h3>
          <a class="range-link" data-range-type="melodic" href="/scales/instrument/saxophone-alto/" aria-label="Rozsah Alt Saxofonu">🎷 Rozsah</a>
        </div>
        <div class="note-row" role="list"></div>
        <div class="staff-container" aria-live="polite"></div>
        <p class="variant-changes">Sestupně se hraje jako aiolská moll.</p>
      </div>
    </section>

  </main>

  <footer class="app-footer" id="app-footer"></footer>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
