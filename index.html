<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Hudební stupnice pro Alt Saxofon" />
  <title>SaxScale</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>🎷 SaxScale</h1>
    <p class="subtitle">Stupnice pro Alt Saxofon</p>
  </header>

  <main>
    <section class="selector-bar" aria-label="Výběr stupnice">
      <label for="root-select">Tónika</label>
      <select id="root-select" aria-label="Výběr tóniky"></select>

      <label for="type-select">Stupnice</label>
      <select id="type-select" aria-label="Výběr typu stupnice"></select>
    </section>

    <section class="scale-section">
      <h2 id="scale-title"></h2>
      <p id="chord-label" class="chord-label"></p>

      <div id="note-row" class="note-row" role="list" aria-label="Noty stupnice"></div>

      <div id="scale-staff" class="staff-container" aria-live="polite"></div>
    </section>

    <section class="range-section">
      <h2>Rozsah Alt Saxofonu</h2>
      <p class="range-hint">Noty stupnice jsou zvýrazněny</p>
      <div id="range-staff" class="staff-container range-staff" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
